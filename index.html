<!DOCTYPE html>

<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Project Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", "Noto Sans Thai", sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #eff6ff 50%, #e0e7ff 100%);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }

    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .fade-in {
      animation: fadeIn 0.25s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-progress {
      background: #fef3c7;
      color: #b45309;
    }

    .status-done {
      background: #dcfce7;
      color: #15803d;
    }

    .status-pending {
      background: #fee2e2;
      color: #b91c1c;
    }

    .status-default {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .nav-active {
      background: #2563eb;
      color: white;
    }

    .nav-inactive {
      background: white;
      color: #475569;
    }
  </style>

</head>

<body>
  <div class="max-w-7xl mx-auto p-6">
    <header class="mb-8">
      <div class="flex items-center justify-between gap-4 flex-wrap">
        <div>
          <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
            <span class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-2 rounded-lg">
              📊
            </span>
            Master Project Dashboard
          </h1>

      <p class="text-gray-500 mt-1">
        Google Sheet Tracking Dashboard
      </p>
    </div>

    <button
      onclick="refreshCurrentPage()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl shadow"
    >
      Refresh Data
    </button>
  </div>
</header>

<div class="flex gap-3 mb-6 flex-wrap">
  <button
    id="btnTracking"
    onclick="switchPage('tracking')"
    class="nav-active px-5 py-3 rounded-xl font-medium shadow"
  >
    📌 Tracking
  </button>

  <button
    id="btnDetailDev"
    onclick="switchPage('detailDev')"
    class="nav-inactive px-5 py-3 rounded-xl font-medium shadow"
  >
    💻 OPS3 Detail Dev
  </button>
</div>

<section id="trackingPage">
  <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Total Projects</p>
      <p class="text-3xl font-bold text-gray-800" id="totalProjects">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">In Progress</p>
      <p class="text-3xl font-bold text-amber-600" id="totalProgress">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Done</p>
      <p class="text-3xl font-bold text-green-600" id="totalDone">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Pending / Blank</p>
      <p class="text-3xl font-bold text-red-600" id="totalPending">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Last Updated</p>
      <p class="text-lg font-bold text-indigo-600" id="lastUpdated">-</p>
    </div>
  </div>

  <div class="glass rounded-2xl card-shadow mb-6 border border-white/50">
    <div class="p-6">
      <div class="flex justify-between items-center mb-4 gap-3 flex-wrap">
        <h2 class="text-xl font-semibold text-gray-800">
          Project Tracking
        </h2>

        <div class="flex gap-2 flex-wrap">
          <button onclick="filterTracking('all')" class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-full">
            All
          </button>

          <button onclick="filterTracking('progress')" class="px-3 py-1 text-sm bg-amber-100 text-amber-700 hover:bg-amber-200 rounded-full">
            In Progress
          </button>

          <button onclick="filterTracking('done')" class="px-3 py-1 text-sm bg-green-100 text-green-700 hover:bg-green-200 rounded-full">
            Done
          </button>

          <button onclick="filterTracking('pending')" class="px-3 py-1 text-sm bg-red-100 text-red-700 hover:bg-red-200 rounded-full">
            Pending
          </button>
        </div>
      </div>

      <input
        id="trackingSearchInput"
        oninput="renderTrackingCards()"
        type="text"
        placeholder="Search project / progress / next step..."
        class="w-full mb-5 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-300"
      />

      <div id="trackingLoading" class="text-center py-10 text-gray-500">
        Loading data...
      </div>

      <div id="tracking-list" class="space-y-4"></div>
    </div>
  </div>
</section>

<section id="detailDevPage" class="hidden">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Total Items</p>
      <p class="text-3xl font-bold text-gray-800" id="devTotalItems">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Columns</p>
      <p class="text-3xl font-bold text-indigo-600" id="devTotalColumns">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Filled Rows</p>
      <p class="text-3xl font-bold text-green-600" id="devFilledRows">0</p>
    </div>

    <div class="glass rounded-2xl p-5 card-shadow border border-white/50">
      <p class="text-gray-500 text-sm font-medium">Last Updated</p>
      <p class="text-lg font-bold text-blue-600" id="devLastUpdated">-</p>
    </div>
  </div>

  <div class="glass rounded-2xl card-shadow mb-6 border border-white/50">
    <div class="p-6">
      <div class="flex justify-between items-center mb-4 gap-3 flex-wrap">
        <h2 class="text-xl font-semibold text-gray-800">
          OPS3 Detail Dev
        </h2>

        <span class="px-3 py-1 rounded-full text-sm bg-blue-100 text-blue-700">
          Auto from Google Sheet
        </span>
      </div>

      <input
        id="devSearchInput"
        oninput="renderDevCards()"
        type="text"
        placeholder="Search OPS3 Detail Dev..."
        class="w-full mb-5 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-300"
      />

      <div id="devLoading" class="text-center py-10 text-gray-500">
        Loading data...
      </div>

      <div id="dev-list" class="space-y-4"></div>
    </div>
  </div>
</section>

  </div>

  <script>
    const trackingCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjOWTjHDP782JFwx-H9-62g_bpwqQIi3SYZUiW2nvuevzkeO91-aKNZ89afL_d46foPzDgRreIeW5X/pub?output=csv";

    const detailDevCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjOWTjHDP782JFwx-H9-62g_bpwqQIi3SYZUiW2nvuevzkeO91-aKNZ89afL_d46foPzDgRreIeW5X/pub?gid=1447211290&single=true&output=csv";

    let currentPage = "tracking";

    let trackingData = [];
    let trackingFilter = "all";

    let devHeaders = [];
    let devData = [];

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (cell || row.length > 0) {
            row.push(cell.trim());
            rows.push(row);
            row = [];
            cell = "";
          }
        } else {
          cell += char;
        }
      }

      if (cell || row.length > 0) {
        row.push(cell.trim());
        rows.push(row);
      }

      return rows;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeStatus(status) {
      return (status || "").toLowerCase().trim();
    }

    function getStatusClass(status) {
      const value = normalizeStatus(status);

      if (value.includes("progress")) return "status-progress";
      if (value.includes("done")) return "status-done";

      if (
        value.includes("pending") ||
        value.includes("wait") ||
        value.includes("hold") ||
        value === ""
      ) {
        return "status-pending";
      }

      return "status-default";
    }

    function switchPage(page) {
      currentPage = page;

      document.getElementById("trackingPage").classList.toggle("hidden", page !== "tracking");
      document.getElementById("detailDevPage").classList.toggle("hidden", page !== "detailDev");

      document.getElementById("btnTracking").className =
        page === "tracking"
          ? "nav-active px-5 py-3 rounded-xl font-medium shadow"
          : "nav-inactive px-5 py-3 rounded-xl font-medium shadow";

      document.getElementById("btnDetailDev").className =
        page === "detailDev"
          ? "nav-active px-5 py-3 rounded-xl font-medium shadow"
          : "nav-inactive px-5 py-3 rounded-xl font-medium shadow";

      if (page === "detailDev" && devData.length === 0) {
        loadDetailDevCSV();
      }
    }

    function refreshCurrentPage() {
      if (currentPage === "tracking") {
        loadTrackingCSV();
      } else {
        loadDetailDevCSV();
      }
    }

    function normalizeTrackingRows(rows) {
      return rows
        .map(row => {
          return {
            Project: row[0] || "",
            CurrentProgress: row[1] || "",
            Update: row[2] || "",
            Status: row[3] || "",
            Vendor: row[4] || "",
            CPLI: row[5] || "",
            MyTeam: row[6] || ""
          };
        })
        .filter(item => {
          const project = (item.Project || "").trim().toLowerCase();

          return (
            project &&
            project !== "project" &&
            project !== "next step ทำอะไรต่อ?"
          );
        });
    }

    async function loadTrackingCSV() {
      document.getElementById("trackingLoading").style.display = "block";
      document.getElementById("tracking-list").innerHTML = "";

      try {
        const response = await fetch(trackingCsvUrl);
        const text = await response.text();
        const rows = parseCSV(text);

        trackingData = normalizeTrackingRows(rows);

        updateTrackingMetrics();
        renderTrackingCards();

        document.getElementById("trackingLoading").style.display = "none";
      } catch (error) {
        document.getElementById("trackingLoading").innerHTML =
          "โหลดข้อมูล Tracking ไม่สำเร็จ กรุณาตรวจสอบ Google Sheet CSV link";
        console.error(error);
      }
    }

    function updateTrackingMetrics() {
      const total = trackingData.length;

      const inProgress = trackingData.filter(item =>
        normalizeStatus(item.Status).includes("progress")
      ).length;

      const done = trackingData.filter(item =>
        normalizeStatus(item.Status).includes("done")
      ).length;

      const pending = trackingData.filter(item => {
        const status = normalizeStatus(item.Status);

        return (
          !status ||
          status.includes("pending") ||
          status.includes("wait") ||
          status.includes("hold")
        );
      }).length;

      document.getElementById("totalProjects").textContent = total;
      document.getElementById("totalProgress").textContent = inProgress;
      document.getElementById("totalDone").textContent = done;
      document.getElementById("totalPending").textContent = pending;

      document.getElementById("lastUpdated").textContent =
        new Date().toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    function filterTracking(filter) {
      trackingFilter = filter;
      renderTrackingCards();
    }

    function getFilteredTrackingData() {
      const keyword = document.getElementById("trackingSearchInput").value.toLowerCase().trim();

      return trackingData.filter(item => {
        const status = normalizeStatus(item.Status);

        let passFilter = true;

        if (trackingFilter === "progress") {
          passFilter = status.includes("progress");
        } else if (trackingFilter === "done") {
          passFilter = status.includes("done");
        } else if (trackingFilter === "pending") {
          passFilter =
            !status ||
            status.includes("pending") ||
            status.includes("wait") ||
            status.includes("hold");
        }

        const text = [
          item.Project,
          item.CurrentProgress,
          item.Status,
          item.Vendor,
          item.CPLI,
          item.MyTeam,
          item.Update
        ].join(" ").toLowerCase();

        const passSearch = !keyword || text.includes(keyword);

        return passFilter && passSearch;
      });
    }

    function renderTrackingCards() {
      const container = document.getElementById("tracking-list");
      const data = getFilteredTrackingData();

      if (data.length === 0) {
        container.innerHTML = `
          <div class="text-center py-10 text-gray-500 bg-white rounded-xl">
            ไม่พบข้อมูลที่ตรงกับเงื่อนไข
          </div>
        `;
        return;
      }

      container.innerHTML = data.map(item => `
        <div class="bg-white rounded-2xl p-5 card-shadow border border-gray-100 fade-in">
          <div class="flex justify-between items-start gap-4 flex-wrap">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2 flex-wrap">
                <span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700">
                  ${escapeHTML(item.Project || "-")}
                </span>

                <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(item.Status)}">
                  ${escapeHTML(item.Status || "Pending")}
                </span>
              </div>

              <h3 class="font-bold text-lg text-gray-800">
                ${escapeHTML(item.Project || "-")}
              </h3>

              <p class="text-gray-600 mt-2 whitespace-pre-line">
                ${escapeHTML(item.CurrentProgress || "-")}
              </p>

              <div class="flex items-center gap-4 mt-3 text-sm text-gray-500 flex-wrap">
                <span>📅 Update: ${escapeHTML(item.Update || "-")}</span>
                <span>👥 My Team: ${escapeHTML(item.MyTeam || "-")}</span>
              </div>
            </div>
          </div>

          <div class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="bg-gray-50 rounded-xl p-4">
              <p class="text-xs text-gray-400 mb-1 font-medium">
                Vendor (SCMS)
              </p>

              <p class="text-sm text-gray-700 whitespace-pre-line">
                ${escapeHTML(item.Vendor || "-")}
              </p>
            </div>

            <div class="bg-gray-50 rounded-xl p-4">
              <p class="text-xs text-gray-400 mb-1 font-medium">
                CPLI / PM / CPG HR
              </p>

              <p class="text-sm text-gray-700 whitespace-pre-line">
                ${escapeHTML(item.CPLI || "-")}
              </p>
            </div>

            <div class="bg-gray-50 rounded-xl p-4">
              <p class="text-xs text-gray-400 mb-1 font-medium">
                My Team
              </p>

              <p class="text-sm text-gray-700 whitespace-pre-line">
                ${escapeHTML(item.MyTeam || "-")}
              </p>
            </div>
          </div>
        </div>
      `).join("");
    }

    function rowsToObjects(rows) {
      if (!rows || rows.length === 0) {
        return { headers: [], data: [] };
      }

      const headers = rows[0].map((header, index) => {
        const cleanHeader = (header || "").trim();
        return cleanHeader || `Column ${index + 1}`;
      });

      const data = rows.slice(1)
        .map(row => {
          const item = {};

          headers.forEach((header, index) => {
            item[header] = row[index] || "";
          });

          return item;
        })
        .filter(item => {
          return Object.values(item).some(value => String(value || "").trim() !== "");
        });

      return { headers, data };
    }

    async function loadDetailDevCSV() {
      document.getElementById("devLoading").style.display = "block";
      document.getElementById("dev-list").innerHTML = "";

      try {
        const response = await fetch(detailDevCsvUrl);
        const text = await response.text();
        const rows = parseCSV(text);

        /*
          OPS3 Detail Dev:
          Row 1-5 = note/header area
          Row 6 = real table header
          Row 7+ = data
        */
        const detailRows = rows.slice(5);
        const result = rowsToObjects(detailRows);

        devHeaders = result.headers;
        devData = result.data;

        updateDevMetrics();
        renderDevCards();

        document.getElementById("devLoading").style.display = "none";
      } catch (error) {
        document.getElementById("devLoading").innerHTML =
          "โหลดข้อมูล OPS3 Detail Dev ไม่สำเร็จ กรุณาตรวจสอบ Google Sheet CSV link";
        console.error(error);
      }
    }

    function updateDevMetrics() {
      document.getElementById("devTotalItems").textContent = devData.length;
      document.getElementById("devTotalColumns").textContent = devHeaders.length;

      const filledRows = devData.filter(item =>
        Object.values(item).some(value => String(value || "").trim() !== "")
      ).length;

      document.getElementById("devFilledRows").textContent = filledRows;

      document.getElementById("devLastUpdated").textContent =
        new Date().toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    function getFilteredDevData() {
      const keyword = document.getElementById("devSearchInput").value.toLowerCase().trim();

      if (!keyword) return devData;

      return devData.filter(item => {
        const text = Object.values(item).join(" ").toLowerCase();
        return text.includes(keyword);
      });
    }

    function renderDevCards() {
      const container = document.getElementById("dev-list");
      const data = getFilteredDevData();

      if (data.length === 0) {
        container.innerHTML = `
          <div class="text-center py-10 text-gray-500 bg-white rounded-xl">
            ไม่พบข้อมูล OPS3 Detail Dev
          </div>
        `;
        return;
      }

      container.innerHTML = data.map((item, index) => {
        const firstValue =
          item[devHeaders[0]] ||
          item.Project ||
          item.Feature ||
          item.Task ||
          item.Name ||
          `OPS3 Detail Dev #${index + 1}`;

        const secondValue =
          item[devHeaders[1]] ||
          item.Description ||
          item.Detail ||
          "";

        const visibleHeaders = devHeaders.filter(header =>
          String(item[header] || "").trim() !== ""
        );

        return `
          <div class="bg-white rounded-2xl p-5 card-shadow border border-gray-100 fade-in">
            <div class="flex items-start justify-between gap-4 flex-wrap mb-4">
              <div>
                <div class="flex items-center gap-2 mb-2 flex-wrap">
                  <span class="px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700">
                    OPS3 Detail Dev
                  </span>

                  <span class="px-3 py-1 rounded-full text-xs font-medium bg-blue-50 text-blue-700">
                    Row ${index + 1}
                  </span>
                </div>

                <h3 class="font-bold text-lg text-gray-800">
                  ${escapeHTML(firstValue || "-")}
                </h3>

                ${
                  secondValue
                    ? `<p class="text-gray-600 mt-2 whitespace-pre-line">${escapeHTML(secondValue)}</p>`
                    : ""
                }
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              ${visibleHeaders.map(header => `
                <div class="bg-gray-50 rounded-xl p-4">
                  <p class="text-xs text-gray-400 mb-1 font-medium">
                    ${escapeHTML(header)}
                  </p>

                  <p class="text-sm text-gray-700 whitespace-pre-line">
                    ${escapeHTML(item[header] || "-")}
                  </p>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    loadTrackingCSV();
  </script>

</body>
</html>
